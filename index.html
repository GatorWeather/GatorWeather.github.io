<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<div id="climateModal" style="display:none;">
    <div class="climateModalOverlay" onclick="closeClimateModal()"></div>
    <div class="climateModalContent">
        <div class="climateModalHeader">
            <div>
                <p class="climateTrackerTitle">Climate Tracker</p>
                <p class="climateTrackerSub">Monthly average temperature by era (°F)</p>
            </div>
            <button class="climateModalCloseBtn" onclick="closeClimateModal()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <canvas id="climateModalCanvas"></canvas>
    </div>
</div>
<body>
    <img src="EngineeringGator_original_transparent.png" class="logo" alt="Gator Engineering logo">

    <form class="weatherForm">
        <div class="searchBox">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input class="cityInput" type="text" placeholder="Search for a city...">
            <i class="fa-solid fa-xmark clearBtn"></i>
            <i class="fa-solid fa-location-crosshairs locationBtn" title="Use current location"></i>
            <div class="suggestions"></div>
            <div class="searchHistory"></div>

        </div>
    </form>

    <div class="mainLayout">
        <div class="leftColumn">
            <div class="card" style="display: none"></div>
            <div class="conditionsContainer"></div>

            <button class="healthToggleBtn" type="button" aria-expanded="false" style="display: none;">
                <span class="toggleLeft">
                    <i class="fa-solid fa-heart-pulse"></i>
                    <span class="toggleText">Show health indicators</span>
                </span>
                <i class="fa-solid fa-chevron-down toggleChevron"></i>
            </button>

            <div class="healthIndicatorsContainer"></div>

            <div class="forecastContainer"></div>

            <button class="climateTrackerBtn" type="button" style="display:none;">
                <span class="toggleLeft">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Climate Tracker</span>
                </span>
                <i class="fa-solid fa-chevron-down toggleChevron"></i>
            </button>

            <div class="climateTrackerContainer"></div>
        </div>
    
        <div class="rightColumn">
             <div class="hourlyPanel"> 
                <h2 class="hourlyTitle">Hourly Forecast</h2>
                <div class="hourlySub">Next 24 hours</div>
                <div class="hourlyList"></div>
             </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
